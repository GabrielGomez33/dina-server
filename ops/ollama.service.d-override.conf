# ============================================================================
# Ollama systemd override for the single 24 GB RTX 3090 Ti box.
#
# INSTALL:
#   sudo mkdir -p /etc/systemd/system/ollama.service.d
#   sudo cp ollama.service.d-override.conf /etc/systemd/system/ollama.service.d/override.conf
#   sudo systemctl daemon-reload
#   sudo systemctl restart ollama
#   ollama ps     # then send one request; confirm "100% GPU"
#
# RATIONALE (each setting fights the "silent CPU offload" failure mode):
# ============================================================================
[Service]
# Pin to the single GPU (matches dina-server's CUDA_VISIBLE_DEVICES).
Environment="CUDA_VISIBLE_DEVICES=0"

# Keep the warm models resident in VRAM for 24h of idle, matching dina-server's
# per-request keep_alive. Prevents 150s cold starts.
Environment="OLLAMA_KEEP_ALIVE=24h"

# Cap how many models can be resident at once. Must be >= the warm set, which
# is THREE models (qwen2.5:3b + mistral:7b + mxbai-embed-large ≈ 10 GB). A cap
# of 3 holds all three workhorses together yet blocks an unexpected 4th model
# (e.g. an accidental codellama:34b) from co-residing and evicting them.
# NOTE: a value below 3 here would cause constant evict/reload churn on the
# warm set — keep it at 3 (or raise it if you add more warm models).
Environment="OLLAMA_MAX_LOADED_MODELS=4"

# Concurrent in-flight generations PER MODEL. 2 lets a couple of @Dina users be
# served at once while keeping KV-cache VRAM bounded (each slot adds one
# num_ctx KV cache). On this single 24 GB card 2 is a safe balance; raise only
# after watching `nvidia-smi` headroom under load. The mirror-server workers
# also throttle concurrency on top of this.
Environment="OLLAMA_NUM_PARALLEL=2"

# Flash attention: smaller, faster KV cache → more headroom on a 24 GB card.
Environment="OLLAMA_FLASH_ATTENTION=1"

# Quantize the KV cache (needs flash attention) to roughly halve its VRAM cost
# with negligible quality impact — extra safety margin against offload.
Environment="OLLAMA_KV_CACHE_TYPE=q8_0"

# Reserve a little VRAM so the desktop/compositor + CUDA context never push a
# model over the edge into CPU. ~1 GB.
Environment="OLLAMA_GPU_OVERHEAD=1073741824"